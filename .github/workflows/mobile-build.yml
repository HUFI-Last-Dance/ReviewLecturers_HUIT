name: Mobile Build

on:
  push:
    branches: ['dev', 'main']
    paths:
      - 'mobile/**'
  pull_request:
    branches: ['dev', 'main']
    paths:
      - 'mobile/**'
  workflow_dispatch: # Cho phép trigger manual từ bất kỳ branch nào

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        working-directory: mobile
        run: npm ci

      - name: Build Android APK
        working-directory: mobile
        run: |
          npx expo prebuild --platform android --clean
          cd android
          ./gradlew assembleRelease

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-${{ github.sha }}
          path: mobile/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 7

      - name: Comment PR with download link
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '📱 Android APK đã build xong! Download từ [Actions artifacts](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})'
            })
