name: Mobile Production Release

on:
  push:
    branches: ['main']
    paths:
      - 'mobile/**'
      - '.github/workflows/mobile-release.yml'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 1.0.0)'
        required: true
        type: string

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        working-directory: mobile
        run: npm ci

      - name: Get version
        id: version
        working-directory: mobile
        run: |
          if [ "${{ github.event.inputs.version }}" != "" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT
          fi

      - name: Create eas.json if not exists
        working-directory: mobile
        run: |
          if [ ! -f eas.json ]; then
            cat > eas.json << 'EOF'
          {
            "cli": {
              "version": ">= 5.0.0"
            },
            "build": {
              "development": {
                "developmentClient": true,
                "distribution": "internal"
              },
              "preview": {
                "distribution": "internal",
                "android": {
                  "buildType": "apk"
                }
              },
              "production": {
                "android": {
                  "buildType": "apk"
                }
              }
            },
            "submit": {
              "production": {}
            }
          }
          EOF
          fi

      - name: Build Android APK with EAS
        working-directory: mobile
        env:
          EXPO_PUBLIC_API_URL: ${{ secrets.PROD_API_URL || 'https://api.reviewlecturers.com/api' }}
        run: |
          eas build --platform android --profile production --non-interactive --no-wait

      - name: Wait for build to complete
        working-directory: mobile
        run: |
          echo "⏳ Waiting for EAS build to complete..."
          BUILD_ID=$(eas build:list --platform android --limit 1 --json | jq -r '.[0].id')
          echo "Build ID: $BUILD_ID"

          # Wait for build (max 30 minutes)
          for i in {1..60}; do
            STATUS=$(eas build:view $BUILD_ID --json | jq -r '.status')
            echo "Build status: $STATUS"

            if [ "$STATUS" = "finished" ]; then
              echo "✅ Build completed successfully!"
              break
            elif [ "$STATUS" = "errored" ] || [ "$STATUS" = "canceled" ]; then
              echo "❌ Build failed with status: $STATUS"
              exit 1
            fi

            sleep 30
          done

      - name: Download APK from EAS
        working-directory: mobile
        run: |
          BUILD_ID=$(eas build:list --platform android --limit 1 --json | jq -r '.[0].id')
          APK_URL=$(eas build:view $BUILD_ID --json | jq -r '.artifacts.buildUrl')

          mkdir -p build
          curl -L -o "build/ReviewLecturers-Android-v${{ steps.version.outputs.version }}.apk" "$APK_URL"

      - name: Create Release Tag
        id: create_tag
        run: |
          TAG="mobile-v${{ steps.version.outputs.version }}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git tag -a "$TAG" -m "Mobile Release v${{ steps.version.outputs.version }}"
          git push origin "$TAG"

      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.create_tag.outputs.tag }}
          release_name: Mobile v${{ steps.version.outputs.version }}
          body: |
            ## 📱 ReviewLecturers Mobile v${{ steps.version.outputs.version }}

            ### 🚀 Tải xuống
            - **Android APK**: Xem file đính kèm bên dưới

            ### 📝 Thông tin
            - **Phiên bản**: v${{ steps.version.outputs.version }}
            - **Ngày phát hành**: ${{ github.event.head_commit.timestamp }}
            - **Commit**: ${{ github.sha }}
            - **Built with**: EAS Build (Expo)

            ### 📥 Hướng dẫn cài đặt
            1. Tải file APK về thiết bị Android
            2. Bật "Cài đặt từ nguồn không xác định" trong Settings
            3. Mở file APK và cài đặt

            ### 🔗 Links
            - [GitHub Repository](https://github.com/${{ github.repository }})
            - [Documentation](https://github.com/${{ github.repository }}/blob/main/README.dev.md)

            ---
            **Build by**: GitHub Actions + EAS Build
          draft: false
          prerelease: false

      - name: Upload APK to Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: mobile/build/ReviewLecturers-Android-v${{ steps.version.outputs.version }}.apk
          asset_name: ReviewLecturers-Android-v${{ steps.version.outputs.version }}.apk
          asset_content_type: application/vnd.android.package-archive

      - name: Get Release Download URL
        id: get_url
        run: |
          RELEASE_URL="https://github.com/${{ github.repository }}/releases/download/${{ steps.create_tag.outputs.tag }}/ReviewLecturers-Android-v${{ steps.version.outputs.version }}.apk"
          echo "download_url=$RELEASE_URL" >> $GITHUB_OUTPUT
          echo "📥 Download URL: $RELEASE_URL"

      - name: Comment on commit
        uses: actions/github-script@v7
        with:
          script: |
            const sha = context.sha;
            const version = '${{ steps.version.outputs.version }}';
            const downloadUrl = '${{ steps.get_url.outputs.download_url }}';
            const releaseUrl = 'https://github.com/${{ github.repository }}/releases/tag/${{ steps.create_tag.outputs.tag }}';

            github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: sha,
              body: `🎉 **Mobile Release v${version} Published!**\n\n` +
                    `📱 **Download APK:** [ReviewLecturers-Android-v${version}.apk](${downloadUrl})\n` +
                    `📦 **Release Page:** [View Release](${releaseUrl})\n` +
                    `🏗️ **Built with:** EAS Build (Expo)\n\n` +
                    `⏱️ Released: ${new Date().toISOString()}`
            });
