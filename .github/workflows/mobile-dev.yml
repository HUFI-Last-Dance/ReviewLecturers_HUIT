name: Mobile Dev Build

on:
  push:
    branches: ['dev']
    paths:
      - 'mobile/**'
      - '.github/workflows/mobile-dev.yml'
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to build from'
        required: false
        default: 'dev'

jobs:
  build-android-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        working-directory: mobile
        run: npm ci

      - name: Get version from package.json
        id: version
        working-directory: mobile
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Create eas.json if not exists
        working-directory: mobile
        run: |
          if [ ! -f eas.json ]; then
            cat > eas.json << 'EOF'
          {
            "cli": {
              "version": ">= 5.0.0"
            },
            "build": {
              "development": {
                "developmentClient": true,
                "distribution": "internal"
              },
              "preview": {
                "distribution": "internal",
                "android": {
                  "buildType": "apk"
                }
              },
              "production": {
                "android": {
                  "buildType": "apk"
                }
              }
            },
            "submit": {
              "production": {}
            }
          }
          EOF
          fi

      - name: Build Android APK with EAS
        working-directory: mobile
        env:
          EXPO_PUBLIC_API_URL: ${{ secrets.DEV_API_URL || 'http://localhost:3000/api' }}
        run: |
          eas build --platform android --profile preview --non-interactive --no-wait

      - name: Wait for build to complete
        working-directory: mobile
        run: |
          echo "⏳ Waiting for EAS build to complete..."
          BUILD_ID=$(eas build:list --platform android --limit 1 --json | jq -r '.[0].id')
          echo "Build ID: $BUILD_ID"

          # Wait for build (max 30 minutes)
          for i in {1..60}; do
            STATUS=$(eas build:view $BUILD_ID --json | jq -r '.status')
            echo "Build status: $STATUS"

            if [ "$STATUS" = "finished" ]; then
              echo "✅ Build completed successfully!"
              break
            elif [ "$STATUS" = "errored" ] || [ "$STATUS" = "canceled" ]; then
              echo "❌ Build failed with status: $STATUS"
              exit 1
            fi

            sleep 30
          done

      - name: Download APK from EAS
        working-directory: mobile
        run: |
          BUILD_ID=$(eas build:list --platform android --limit 1 --json | jq -r '.[0].id')
          APK_URL=$(eas build:view $BUILD_ID --json | jq -r '.artifacts.buildUrl')

          mkdir -p build
          curl -L -o "build/ReviewLecturers-Dev-v${{ steps.version.outputs.version }}-${{ github.sha }}.apk" "$APK_URL"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ReviewLecturers-Dev-v${{ steps.version.outputs.version }}
          path: mobile/build/*.apk
          retention-days: 30

      - name: Comment on commit
        if: github.event_name == 'push'
        uses: actions/github-script@v7
        with:
          script: |
            const sha = context.sha;
            const runId = context.runId;
            const version = '${{ steps.version.outputs.version }}';

            github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: sha,
              body: `📱 **Android APK Dev Build Complete!**\n\n` +
                    `**Version:** v${version}\n` +
                    `**Branch:** dev\n` +
                    `**Built with:** EAS Build\n` +
                    `**Download:** [Actions Artifacts](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${runId})\n\n` +
                    `⏱️ Build time: ${new Date().toISOString()}`
            });
